name: Build & Release Installer

# Updated to re-register workflow triggers with GitHub
on:
  push:
    tags:
      - "v*.*.*" # Triggers on version tags like v1.0.0
  workflow_dispatch: # Allows manual trigger from GitHub UI

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write # Required to create releases

jobs:
  build-installer:
    name: Build ${{ matrix.os }} Installer
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: Windows
            runner: windows-latest
            build-script: npm run build
            artifact-pattern: "*Setup-*.exe"
            artifact-name: avanevis-installer-windows
          - os: macOS
            runner: macos-14 # macOS 14 (Sonoma) with M1/M2/M3 runners
            build-script: npm run build:mac
            artifact-pattern: "*Setup-*.dmg"
            artifact-name: avanevis-installer-macos

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Verify Swift version (macOS)
        if: matrix.os == 'macOS'
        run: |
          swift --version
          echo "Swift toolchain ready for AudioCaptureHelper build"

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"

      - name: Install Node dependencies
        run: npm ci

      - name: Create placeholder icon (if missing - Windows only)
        if: matrix.os == 'Windows'
        shell: pwsh
        run: |
          # Ensure build directory exists
          if (-not (Test-Path "build")) {
            New-Item -ItemType Directory -Path "build" | Out-Null
          }

          if (-not (Test-Path "build/icon.ico")) {
            Write-Host "Creating placeholder icon..."
            # Download a placeholder microphone icon
            $url = "https://raw.githubusercontent.com/icons8/flat-color-icons/master/png/256/microphone.png"
            $png = "build/temp.png"

            try {
              Invoke-WebRequest -Uri $url -OutFile $png -ErrorAction Stop

              # Convert PNG to ICO using PowerShell
              Add-Type -AssemblyName System.Drawing
              $img = [System.Drawing.Image]::FromFile((Resolve-Path $png))
              $icon = [System.Drawing.Icon]::FromHandle($img.GetHicon())
              $stream = [System.IO.File]::Create("build/icon.ico")
              $icon.Save($stream)
              $stream.Close()
              $img.Dispose()

              Remove-Item $png
              Write-Host "Placeholder icon created!"
            } catch {
              Write-Host "Could not create icon, using fallback..."
              # Create a minimal 1x1 ICO as absolute fallback
              $bytes = @(0,0,1,0,1,0,16,16,0,0,1,0,32,0,104,4,0,0,22,0,0,0)
              [System.IO.File]::WriteAllBytes("build/icon.ico", $bytes)
            }
          }

      # Note: npm run build/build:mac includes prepare-build which:
      # 1. Cleans dist/ folder (prevents stale files from previous builds)
      # 2. Downloads Python runtime, ffmpeg, and prepares dependencies
      - name: Build installer (Windows)
        if: matrix.os == 'Windows'
        run: ${{ matrix.build-script }}
        timeout-minutes: 45

      - name: Build installer (macOS)
        if: matrix.os == 'macOS'
        # Optional Apple Developer signing (omit until enrolled — builds ad-hoc sign today):
        # CSC_LINK / CSC_KEY_PASSWORD / APPLE_ID / APPLE_APP_SPECIFIC_PASSWORD / APPLE_TEAM_ID
        run: |
          echo "Open file limit before: $(ulimit -n)"
          ulimit -n 10240 || true
          echo "Open file limit after: $(ulimit -n)"
          ${{ matrix.build-script }}
        timeout-minutes: 45

      - name: Verify packaged macOS app smoke checks
        if: matrix.os == 'macOS'
        run: bash scripts/verify-macos-packaged-app.sh

      - name: Verify package version matches tag
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          set -euo pipefail
          tag_version="${GITHUB_REF#refs/tags/v}"
          package_version="$(node -p "require('./package.json').version")"
          if [ "$package_version" != "$tag_version" ]; then
            echo "package.json version ($package_version) does not match tag ($tag_version)"
            exit 1
          fi

      - name: Find installer file
        id: find_installer
        shell: bash
        run: |
          set -euo pipefail
          pattern="${{ matrix.artifact-pattern }}"
          installer=$(find dist -name "$pattern" -type f -print | head -n 1)

          if [ -z "$installer" ]; then
            echo "Expected installer not found for pattern: $pattern"
            find dist -maxdepth 3 -type f | sort || true
            exit 1
          fi

          echo "installer_path=$installer" >> $GITHUB_OUTPUT
          echo "installer_name=$(basename "$installer")" >> $GITHUB_OUTPUT

      - name: Upload installer artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ steps.find_installer.outputs.installer_path }}
          retention-days: 30
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    needs: build-installer
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest

    steps:
      # Checkout must run before download-artifact: checkout clears the workspace and
      # would delete release-artifacts/ if download ran first (see f411436 regression).
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"

      - name: Install Node dependencies
        run: npm ci

      - name: Resolve release version
        id: release_version
        shell: bash
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Stage release legal assets
        env:
          RELEASE_VERSION: ${{ steps.release_version.outputs.version }}
          RELEASE_LEGAL_DIR: ${{ github.workspace }}/release-legal
        run: node scripts/stage-release-legal-assets.js

      - name: Download installer artifacts
        uses: actions/download-artifact@v8
        with:
          path: release-artifacts

      - name: Collect release assets
        id: collect_assets
        shell: bash
        run: |
          set -euo pipefail

          windows_asset=$(find release-artifacts/avanevis-installer-windows -type f -name '*.exe' | head -n 1)
          macos_asset=$(find release-artifacts/avanevis-installer-macos -type f -name '*.dmg' | head -n 1)

          if [ -z "$windows_asset" ] || [ -z "$macos_asset" ]; then
            echo "Expected release assets were not downloaded"
            find release-artifacts -maxdepth 3 -type f | sort || true
            exit 1
          fi

          mkdir -p release-upload
          cp "$windows_asset" release-upload/
          cp "$macos_asset" release-upload/

          echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          echo "windows_name=$(basename "$windows_asset")" >> $GITHUB_OUTPUT
          echo "windows_size=$(du -h "$windows_asset" | cut -f1)" >> $GITHUB_OUTPUT
          echo "macos_name=$(basename "$macos_asset")" >> $GITHUB_OUTPUT
          echo "macos_size=$(du -h "$macos_asset" | cut -f1)" >> $GITHUB_OUTPUT

      - name: Build release notes
        shell: bash
        run: |
          VERSION="${{ steps.collect_assets.outputs.version }}"
          NOTES_FILE="docs/releases/v${VERSION}.md"

          cat <<EOF > release-notes.md
          ## AvaNevis v${VERSION}

          ### Downloads

          - Windows installer: `${{ steps.collect_assets.outputs.windows_name }}` (${{ steps.collect_assets.outputs.windows_size }})
          - macOS installer: `${{ steps.collect_assets.outputs.macos_name }}` (${{ steps.collect_assets.outputs.macos_size }})

          EOF

          if [ -f "$NOTES_FILE" ]; then
            # Prefer the curated release doc (skip its H1); keep Downloads above.
            tail -n +2 "$NOTES_FILE" >> release-notes.md
            printf '\n' >> release-notes.md
          else
            cat <<EOF >> release-notes.md
          ### What's New

          - See \`docs/releases/v${VERSION}.md\` (add this file before tagging) or the [README](https://github.com/${{ github.repository }}/blob/master/README.md) Highlights for this release.

          ### Platform Support

          - Windows 10/11 x64
          - macOS 13+ on Apple Silicon

          ### Installation

          **Windows**
          1. Download the \`.exe\` installer.
          2. Run it. If SmartScreen appears, choose "More info" then "Run anyway".
          3. Launch AvaNevis from the Start Menu.

          **macOS**
          1. Download the \`.dmg\` file.
          2. Drag AvaNevis into Applications.
          3. On first launch, right-click the app and choose "Open" to bypass Gatekeeper for the unsigned build.
          4. Grant microphone and screen recording permissions when prompted.

          ### Notes

          - The app records microphone and desktop audio locally, then transcribes on-device.
          - Whisper models download on first use unless they are already cached locally.
          - GPU acceleration is used automatically when supported (CUDA on Windows, Metal on Apple Silicon).

          ### Privacy

          - Zero telemetry
          - No cloud transcription
          - No account required

          ### Help

          - Documentation: https://github.com/${{ github.repository }}/blob/master/README.md
          - Security audit: https://github.com/${{ github.repository }}/blob/master/docs/completed/audits/SECURITY_AUDIT.md
          - Third-party notices: https://github.com/${{ github.repository }}/blob/master/THIRD_PARTY_NOTICES.md
          EOF
          fi

          cat docs/development/RELEASE_FFMPEG_NOTICE.md >> release-notes.md

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          name: AvaNevis ${{ github.ref_name }}
          files: |
            release-upload/*
            release-legal/legal/ffmpeg-8.0.1.tar.xz
            release-legal/legal/THIRD_PARTY_NOTICES.md
            release-legal/avanevis-legal-${{ steps.collect_assets.outputs.version }}.zip
          body_path: release-notes.md
          fail_on_unmatched_files: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
