name: Build & Release Installer

# Updated to re-register workflow triggers with GitHub
on:
  push:
    tags:
      - "v*.*.*" # Triggers on version tags like v1.0.0
  workflow_dispatch: # Allows manual trigger from GitHub UI

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write # Required to create releases

jobs:
  build-installer:
    name: Build ${{ matrix.os }} Installer
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: Windows
            runner: windows-latest
            build-script: npm run build
            artifact-pattern: "*Setup-*.exe"
            artifact-name: meeting-transcriber-installer-windows
          - os: macOS
            runner: macos-14 # macOS 14 (Sonoma) with M1/M2/M3 runners
            build-script: npm run build:mac
            artifact-pattern: "*Setup-*.dmg"
            artifact-name: meeting-transcriber-installer-macos

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Verify Swift version (macOS)
        if: matrix.os == 'macOS'
        run: |
          swift --version
          echo "Swift toolchain ready for AudioCaptureHelper build"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: Install Node dependencies
        run: npm ci

      - name: Create placeholder icon (if missing - Windows only)
        if: matrix.os == 'Windows'
        shell: pwsh
        run: |
          # Ensure build directory exists
          if (-not (Test-Path "build")) {
            New-Item -ItemType Directory -Path "build" | Out-Null
          }

          if (-not (Test-Path "build/icon.ico")) {
            Write-Host "Creating placeholder icon..."
            # Download a placeholder microphone icon
            $url = "https://raw.githubusercontent.com/icons8/flat-color-icons/master/png/256/microphone.png"
            $png = "build/temp.png"

            try {
              Invoke-WebRequest -Uri $url -OutFile $png -ErrorAction Stop

              # Convert PNG to ICO using PowerShell
              Add-Type -AssemblyName System.Drawing
              $img = [System.Drawing.Image]::FromFile((Resolve-Path $png))
              $icon = [System.Drawing.Icon]::FromHandle($img.GetHicon())
              $stream = [System.IO.File]::Create("build/icon.ico")
              $icon.Save($stream)
              $stream.Close()
              $img.Dispose()

              Remove-Item $png
              Write-Host "Placeholder icon created!"
            } catch {
              Write-Host "Could not create icon, using fallback..."
              # Create a minimal 1x1 ICO as absolute fallback
              $bytes = @(0,0,1,0,1,0,16,16,0,0,1,0,32,0,104,4,0,0,22,0,0,0)
              [System.IO.File]::WriteAllBytes("build/icon.ico", $bytes)
            }
          }

      # Note: npm run build/build:mac includes prepare-build which:
      # 1. Cleans dist/ folder (prevents stale files from previous builds)
      # 2. Downloads Python runtime, ffmpeg, and prepares dependencies
      - name: Build installer
        run: ${{ matrix.build-script }}
        timeout-minutes: 45
        env:
          DOWNLOAD_MODELS: "false" # Skip model download - users download on-demand

      - name: Find installer file
        id: find_installer
        shell: bash
        run: |
          set -euo pipefail
          pattern="${{ matrix.artifact-pattern }}"
          installer=$(find dist -name "$pattern" -type f -print | head -n 1)

          if [ -z "$installer" ]; then
            echo "Expected installer not found for pattern: $pattern"
            find dist -maxdepth 3 -type f | sort || true
            exit 1
          fi

          echo "installer_path=$installer" >> $GITHUB_OUTPUT
          echo "installer_name=$(basename "$installer")" >> $GITHUB_OUTPUT

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ steps.find_installer.outputs.installer_path }}
          retention-days: 30
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    needs: build-installer
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest

    steps:
      - name: Download installer artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Collect release assets
        id: collect_assets
        shell: bash
        run: |
          set -euo pipefail

          windows_asset=$(find release-artifacts/meeting-transcriber-installer-windows -type f -name '*.exe' | head -n 1)
          macos_asset=$(find release-artifacts/meeting-transcriber-installer-macos -type f -name '*.dmg' | head -n 1)

          if [ -z "$windows_asset" ] || [ -z "$macos_asset" ]; then
            echo "Expected release assets were not downloaded"
            find release-artifacts -maxdepth 3 -type f | sort || true
            exit 1
          fi

          mkdir -p release-upload
          cp "$windows_asset" release-upload/
          cp "$macos_asset" release-upload/

          echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          echo "windows_name=$(basename "$windows_asset")" >> $GITHUB_OUTPUT
          echo "windows_size=$(du -h "$windows_asset" | cut -f1)" >> $GITHUB_OUTPUT
          echo "macos_name=$(basename "$macos_asset")" >> $GITHUB_OUTPUT
          echo "macos_size=$(du -h "$macos_asset" | cut -f1)" >> $GITHUB_OUTPUT

      - name: Build release notes
        shell: bash
        run: |
          cat <<EOF > release-notes.md
          ## Meeting Transcriber v${{ steps.collect_assets.outputs.version }}

          ### Downloads

          - Windows installer: `${{ steps.collect_assets.outputs.windows_name }}` (${{ steps.collect_assets.outputs.windows_size }})
          - macOS installer: `${{ steps.collect_assets.outputs.macos_name }}` (${{ steps.collect_assets.outputs.macos_size }})

          ### Platform Support

          - Windows 10/11 x64
          - macOS 13+ on Apple Silicon

          ### Installation

          **Windows**
          1. Download the `.exe` installer.
          2. Run it. If SmartScreen appears, choose "More info" then "Run anyway".
          3. Launch Meeting Transcriber from the Start Menu.

          **macOS**
          1. Download the `.dmg` file.
          2. Drag Meeting Transcriber into Applications.
          3. On first launch, right-click the app and choose "Open" to bypass Gatekeeper for the unsigned build.
          4. Grant microphone and screen recording permissions when prompted.

          ### Notes

          - The app records microphone and desktop audio locally, then transcribes on-device.
          - Whisper models download on first use unless they are already cached locally.
          - GPU acceleration is used automatically when supported (CUDA on Windows, Metal on Apple Silicon).

          ### Privacy

          - Zero telemetry
          - No cloud transcription
          - No account required

          ### Help

          - Documentation: https://github.com/${{ github.repository }}/blob/master/README.md
          - Security audit: https://github.com/${{ github.repository }}/blob/master/docs/internal/SECURITY_AUDIT.md
          EOF

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Meeting Transcriber ${{ github.ref_name }}
          files: release-upload/*
          body_path: release-notes.md
          fail_on_unmatched_files: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
