name: CI - Tests & Validation

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-backend-windows:
    name: Test Python Backend (Windows)
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v6

    - name: Set up Python 3.11
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements-windows.txt
        pip install -r requirements-dev.txt

    - name: Run Python unit tests
      run: python -m pytest tests/python

    - name: Validate Python syntax
      shell: pwsh
      run: |
        Get-ChildItem backend/*.py | ForEach-Object { python -m py_compile $_.FullName }
        Get-ChildItem backend/audio/*.py | ForEach-Object { python -m py_compile $_.FullName }
        Get-ChildItem backend/transcription/*.py | ForEach-Object { python -m py_compile $_.FullName }

    - name: Smoke-check device manager
      shell: pwsh
      run: |
        python backend/device_manager.py > $null 2>&1
        if ($LASTEXITCODE -ne 0) { Write-Host "Device manager check complete (expected on CI without hardware)" }

    - name: Check code style
      run: |
        pip install flake8
        flake8 backend --count --select=E9,F63,F7,F82 --show-source --statistics
      continue-on-error: true

  test-backend-macos:
    name: Test Python Backend (macOS)
    runs-on: macos-14  # Apple Silicon runner
    timeout-minutes: 75

    steps:
    - uses: actions/checkout@v6

    - name: Set up Python 3.11
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements-macos.txt
        pip install -r requirements-dev.txt

    - name: Run Python unit tests
      run: python -m pytest tests/python

    - name: Validate Python syntax (all backend files)
      run: |
        echo "Validating Python syntax..."
        python -m py_compile backend/*.py
        python -m py_compile backend/audio/*.py
        python -m py_compile backend/transcription/*.py
        echo "✓ All Python files have valid syntax"

    - name: Test PyObjC imports
      run: |
        echo "Testing PyObjC framework imports..."
        python -c "
        import sys
        try:
            from ScreenCaptureKit import SCShareableContent, SCContentFilter, SCStreamConfiguration, SCStream
            print('✓ ScreenCaptureKit imports OK')
        except ImportError as e:
            print(f'⚠ ScreenCaptureKit import failed: {e}')
            # Don't fail - PyObjC may have issues on CI runners

        try:
            from AVFoundation import AVAudioFormat
            print('✓ AVFoundation imports OK')
        except ImportError as e:
            print(f'⚠ AVFoundation import failed: {e}')

        try:
            import sounddevice as sd
            print('✓ sounddevice imports OK')
        except ImportError as e:
            print(f'✗ sounddevice import failed: {e}')
            sys.exit(1)

        try:
            import numpy as np
            print('✓ numpy imports OK')
        except ImportError as e:
            print(f'✗ numpy import failed: {e}')
            sys.exit(1)
        "

    - name: Build Swift AudioCaptureHelper
      run: |
        echo "Building Swift AudioCaptureHelper..."
        cd swift/AudioCaptureHelper
        swift build -c release --arch arm64
        echo "✓ Swift helper built successfully"

        # Find and verify binary
        BINARY=""
        if [ -f .build/release/audiocapture-helper ]; then
          BINARY=".build/release/audiocapture-helper"
        elif [ -f .build/arm64-apple-macosx/release/audiocapture-helper ]; then
          BINARY=".build/arm64-apple-macosx/release/audiocapture-helper"
        fi

        if [ -n "$BINARY" ]; then
          echo "✓ Binary found at $BINARY"
          BEFORE=$(stat -f%z "$BINARY")
          strip "$BINARY"
          AFTER=$(stat -f%z "$BINARY")
          echo "✓ Stripped: ${BEFORE} → ${AFTER} bytes"
        else
          echo "✗ Binary not found at expected locations"
          ls -la .build/ || true
          exit 1
        fi

    - name: Check code style
      run: |
        pip install flake8
        flake8 backend --count --select=E9,F63,F7,F82 --show-source --statistics
      continue-on-error: true

    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '24'
        cache: 'npm'

    - name: Install Node dependencies
      run: npm ci

    - name: Build packaged macOS app smoke test
      run: |
        echo "Open file limit before: $(ulimit -n)"
        ulimit -n 10240 || true
        echo "Open file limit after: $(ulimit -n)"
        npm run build:mac:dir
      env:
        DOWNLOAD_MODELS: "false"

    - name: Verify packaged macOS helper and resources
      run: |
        APP_PATH="dist/mac-arm64/AvaNevis.app"
        HELPER_PATH="$APP_PATH/Contents/Resources/bin/audiocapture-helper"
        PYTHON_PATH="$APP_PATH/Contents/Resources/python/bin/python3"
        FFMPEG_PATH="$APP_PATH/Contents/Resources/ffmpeg/ffmpeg"

        test -d "$APP_PATH"
        test -f "$HELPER_PATH"
        test -x "$HELPER_PATH"
        test -f "$PYTHON_PATH"
        test -f "$FFMPEG_PATH"
        test -x "$FFMPEG_PATH"
        file "$FFMPEG_PATH" | grep -q "arm64"
        codesign --verify --strict --verbose=2 "$FFMPEG_PATH"
        "$FFMPEG_PATH" -version | grep -q "ffmpeg version"

        codesign --verify --strict --verbose=2 "$HELPER_PATH"
        codesign -d --entitlements :- "$HELPER_PATH" | grep -q "com.apple.security.inherit"

        helper_output="$(
        python - "$HELPER_PATH" 2>&1 <<'PY'
        import subprocess
        import sys

        helper_path = sys.argv[1]

        try:
            result = subprocess.run(
                [helper_path, "--help"],
                capture_output=True,
                text=True,
                timeout=10,
                check=False,
            )
            sys.stdout.write(result.stdout)
            sys.stderr.write(result.stderr)
            sys.exit(result.returncode)
        except subprocess.TimeoutExpired as exc:
            if exc.stdout:
                sys.stdout.write(exc.stdout if isinstance(exc.stdout, str) else exc.stdout.decode(errors="replace"))
            if exc.stderr:
                sys.stderr.write(exc.stderr if isinstance(exc.stderr, str) else exc.stderr.decode(errors="replace"))
            print("audiocapture-helper --help timed out", file=sys.stderr)
            sys.exit(124)
        PY
        )"
        echo "$helper_output"
        echo "$helper_output" | grep -q "AudioCaptureHelper"

        echo "✓ Packaged macOS app contains helper, Python, and arm64 ffmpeg"

  test-frontend:
    name: Test Electron Frontend & Build Smoke
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
    - uses: actions/checkout@v6

    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '24'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Validate main process syntax
      run: node --check src/main.js

    - name: Validate preload syntax
      run: node --check src/preload.js

    - name: Validate renderer syntax
      run: node --check src/renderer/app.js

    - name: Run frontend regression tests
      run: npm run test:js

    - name: Build packaged app smoke test
      run: npm run build:dir
      env:
        DOWNLOAD_MODELS: "false"

    - name: Verify packaged build output
      shell: pwsh
      run: |
        if (-not (Test-Path "dist/win-unpacked")) {
          throw "Missing dist/win-unpacked build output"
        }

        $exe = Get-ChildItem "dist/win-unpacked" -Filter *.exe | Select-Object -First 1
        if (-not $exe) {
          throw "Missing executable in dist/win-unpacked"
        }

        $helper = Get-ChildItem "dist/win-unpacked" -Recurse -Filter "audiocapture-helper" -ErrorAction SilentlyContinue
        if ($helper) {
          throw "Windows package contains stale macOS audiocapture-helper"
        }

    - name: Check for npm security vulnerabilities
      run: npm audit --audit-level=high

  security-audit:
    name: Security audit (${{ matrix.label }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: npm
            runner: ubuntu-latest
            kind: npm
          - label: macos-python
            runner: macos-14
            kind: pip-macos
          - label: windows-python
            runner: windows-latest
            kind: pip-windows

    steps:
    - uses: actions/checkout@v6

    - name: Set up Node.js
      if: matrix.kind == 'npm'
      uses: actions/setup-node@v6
      with:
        node-version: '24'
        cache: 'npm'

    - name: Install Node dependencies
      if: matrix.kind == 'npm'
      run: npm ci

    - name: Audit npm dependencies
      if: matrix.kind == 'npm'
      run: npm audit --audit-level=high

    - name: Set up Python 3.11
      if: matrix.kind != 'npm'
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'

    - name: Audit pinned macOS Python dependencies
      if: matrix.kind == 'pip-macos'
      run: |
        python -m pip install pip-audit
        python -m pip_audit -r requirements-macos-build.txt

    - name: Audit pinned Windows Python dependencies
      if: matrix.kind == 'pip-windows'
      shell: pwsh
      run: |
        python -m pip install pip-audit
        python -m pip_audit -r requirements-windows-build.txt

  validate-docs:
    name: Validate Documentation
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - name: Check markdown files
      uses: DavidAnson/markdownlint-cli2-action@v23
      with:
        globs: |
          README.md
          docs/**/*.md
      continue-on-error: true

    - name: Check for broken links
      uses: gaurav-nelson/github-action-markdown-link-check@1.0.17
      with:
        config-file: '.github/markdown-link-config.json'
      continue-on-error: true
