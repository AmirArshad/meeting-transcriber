version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      electron-toolchain:
        patterns:
          - electron
          - electron-builder
        update-types:
          - minor
          - patch

  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
      day: monday
    # Paused while phased Python upgrades run on chore/phased-dependency-upgrades (todo.md).
    open-pull-requests-limit: 0
    ignore:
      # Re-enable pip PRs after Phase 4; ignores below are backup if limit is raised early.
      # Phased upgrades on chore/phased-dependency-upgrades — see todo.md
      - dependency-name: numpy
        update-types:
          - version-update:semver-major
      - dependency-name: scipy
      - dependency-name: soxr
      - dependency-name: pytest
      - dependency-name: tiktoken
    groups:
      python-runtime-pins:
        patterns:
          - filelock
          - certifi
          - urllib3
          - requests
        update-types:
          - patch
          - minor
