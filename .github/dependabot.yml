version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      electron-toolchain:
        patterns:
          - electron
          - electron-builder
        update-types:
          - minor
          - patch

  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
      day: monday
    # Re-enabled after Phases 1-4; keep numpy/scipy majors manual.
    open-pull-requests-limit: 5
    ignore:
      # Keep major upgrades manual for coordinated ML stack validation.
      - dependency-name: numpy
        update-types:
          - version-update:semver-major
      - dependency-name: scipy
        update-types:
          - version-update:semver-major
      - dependency-name: tiktoken
      - dependency-name: pyobjc-framework-ScreenCaptureKit
        update-types:
          - version-update:semver-major
      - dependency-name: pyobjc-framework-CoreAudio
        update-types:
          - version-update:semver-major
      - dependency-name: pyobjc-framework-AVFoundation
        update-types:
          - version-update:semver-major
    groups:
      python-runtime-pins:
        patterns:
          - filelock
          - certifi
          - urllib3
          - requests
        update-types:
          - patch
          - minor
